<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copenhagen Pollen Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2 { color: #2c3e50; }
        label { display: block; margin-bottom: 8px; cursor: pointer; }
        select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; }
        .checkbox-group { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; font-weight: bold; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #27ae60; }
        #results { margin-top: 20px; }
        #status { font-style: italic; color: #7f8c8d; margin-bottom: 15px; }
        .result-item { padding: 15px; border-left: 5px solid #ccc; background: #f9f9f9; margin-bottom: 10px; border-radius: 4px; }
        .severity-low { border-color: #27ae60; }
        .severity-medium { border-color: #f39c12; }
        .severity-high { border-color: #c0392b; color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Copenhagen Pollen Tracker</h1>
        <p>Check the pollen severity based on your allergies.</p>
        
        <div id="status"> Loading pollen data...</div>

        <h3>1. Select Your Allergies:</h3>
        <div class="checkbox-group">
            <label><input type="checkbox" value="Grass" class="allergy-check"> Grass</label>
            <label><input type="checkbox" value="Birch" class="allergy-check"> Birch</label>
            <label><input type="checkbox" value="Oak" class="allergy-check"> Oak</label>
            <label><input type="checkbox" value="Pine" class="allergy-check"> Pine</label>
        </div>

        <h3>2. Choose a Location:</h3>
        <select id="locationSelect">
            <option value="University Park">University Park</option>
            <option value="Islands brygge">Islands brygge</option>
            <option value="Nordhavn">Nordhavn</option>
            <option value="Sydhavn">Sydhavn</option>
            <option value="Ryparken">Ryparken</option>
        </select>

        <button onclick="analyzeData()">Check My Pollen Risk</button>
    </div>

    <div id="results"></div>

    <script>
        let globalPollenData = [];

        // Fetches the file when loading the site
        window.onload = function() {
            fetch('copenhagen_pollen_data_regex_v2.csv')
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Could not find the CSV file.");
                    }
                    return response.text();
                })
                .then(csvText => {
                    processCSV(csvText);
                    document.getElementById('status').innerHTML = "<strong></strong>";
                    document.getElementById('status').style.color = "#27ae60";
                })
                .catch(error => {
                    document.getElementById('status').innerHTML = " <strong>Error:</strong> " + error.message;
                    document.getElementById('status').style.color = "#c0392b";
                });
        };

        // Parse and Clean the Data using Regex
        function processCSV(csvText) {
            const rows = csvText.split('\n');
            globalPollenData = [];

            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue; 
                
                const columns = rows[i].split(',');
                if (columns.length < 5) continue;

                const rawDate = columns[0];
                const rawTime = columns[1];
                const rawLoc = columns[2];
                const rawType = columns[3];
                const rawConc = columns[4];

                let loc = rawLoc.trim();
                if (/island[s]?\s?brygge/i.test(loc)) loc = "Islands brygge";
                else if (/univ\.?\s*park/i.test(loc)) loc = "University Park";
                else if (/nordhavn/i.test(loc)) loc = "Nordhavn";
                else if (/sydhavn/i.test(loc)) loc = "Sydhavn";
                else if (/ryparken/i.test(loc)) loc = "Ryparken";

                let type = rawType.trim();
                if (/gr[a|s]ss?/i.test(type)) type = "Grass";
                else if (/b[i|u]rch/i.test(type)) type = "Birch";
                else if (/oak/i.test(type)) type = "Oak";
                else if (/pine/i.test(type)) type = "Pine";

                let concentration = parseInt(rawConc.replace(/\D/g, ''), 10);
                if (isNaN(concentration)) concentration = 0;

                globalPollenData.push({
                    date: rawDate.trim(),
                    time: rawTime.trim(),
                    location: loc,
                    type: type,
                    concentration: concentration
                });
            }
        }

        function analyzeData() {
            if (globalPollenData.length === 0) {
                alert("Data is still loading or failed to load.");
                return;
            }

            const selectedAllergies = Array.from(document.querySelectorAll('.allergy-check:checked')).map(cb => cb.value);
            if (selectedAllergies.length === 0) {
                alert("Please select at least one allergy.");
                return;
            }

            const selectedLocation = document.getElementById('locationSelect').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<h2>Analysis for ${selectedLocation}</h2>`;

            const relevantData = globalPollenData.filter(row => 
                row.location === selectedLocation && 
                selectedAllergies.includes(row.type)
            );

            const averages = {};
            selectedAllergies.forEach(allergy => {
                const allergyData = relevantData.filter(row => row.type === allergy);
                const total = allergyData.reduce((sum, row) => sum + row.concentration, 0);
                const avg = allergyData.length > 0 ? Math.round(total / allergyData.length) : 0;
                averages[allergy] = avg;
            });

            selectedAllergies.forEach(allergy => {
                const avg = averages[allergy];
                let severityClass = "severity-low";
                let severityText = "Low Risk - You should be fine!";

                if (avg > 80) {
                    severityClass = "severity-high";
                    severityText = "High Risk - Bring antihistamines!";
                } else if (avg > 30) {
                    severityClass = "severity-medium";
                    severityText = "Moderate Risk - You might feel some symptoms.";
                }

                resultsDiv.innerHTML += `
                    <div class="result-item ${severityClass}">
                        <strong>${allergy} Pollen Average:</strong> ${avg} grains/m³
                        <br><em>${severityText}</em>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
