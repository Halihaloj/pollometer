<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagens Pollometer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .pollometer-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }

        h2 { color: #333; margin-bottom: 5px; }
        p.subtitle { color: #777; font-size: 14px; margin-bottom: 30px; }

        .gauge-wrapper {
            position: relative;
            width: 300px;
            height: 150px;
            margin: 0 auto;
            overflow: hidden;
        }

        .gauge-body {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 200%;
            border-radius: 50%;
            background: conic-gradient(from 270deg, #2ecc71 0deg, #ffcc00 90deg, #ff4d4d 180deg, #e0e0e0 180deg);
        }

        .gauge-cover {
            position: absolute;
            top: 20px; left: 20px; width: 260px; height: 260px;
            background-color: white;
            border-radius: 50%;
        }

        .gauge-needle {
            position: absolute;
            bottom: 0; left: 50%; width: 6px; height: 130px;
            background-color: #333;
            border-top-left-radius: 4px; border-top-right-radius: 4px;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg); 
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gauge-center-point {
            position: absolute;
            bottom: -10px; left: calc(50% - 10px);
            width: 20px; height: 20px; background-color: #333; border-radius: 50%;
        }

        .gauge-value { font-size: 24px; font-weight: bold; color: #333; margin-top: 20px; }
        .pollen-info { font-size: 16px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="pollometer-container">
    <h2>Dagens Pollometer</h2>
    <p class="subtitle">Live status på pollenluftkvaliteten</p>

    <div class="gauge-wrapper">
        <div class="gauge-body"></div>
        <div class="gauge-cover"></div>
        <div class="gauge-needle" id="needle"></div>
        <div class="gauge-center-point"></div>
    </div>

    <div class="gauge-value" id="status-text">Henter data...</div>
    <div class="pollen-info" id="pollen-detaljer"></div>
</div>

<script>
    const pollenType = "Græspollen (Test-data)";
    const pollenTal = parseInt("15");
    const maxForventet = 100; // 100 svarer til max på vores visuelle måler

    // Beregn procent til nålen (mellem 0 og 100)
    let procent = (pollenTal / maxForventet) * 100;
    if (procent > 100) procent = 100;
    
    const grader = (procent / 100) * 180;
    document.getElementById('needle').style.transform = `translateX(-50%) rotate(${grader}deg)`;
    
    // Logik for Astma-Allergi Danmarks grænser for græs:
    // Lav: under 10, Moderat: 10-50, Høj: over 50
    let niveau = "Lavt";
    if (pollenTal >= 50) {
        niveau = "Meget højt!";
    } else if (pollenTal >= 10) {
        niveau = "Moderat";
    }

    document.getElementById('status-text').innerText = `${niveau} niveau`;
    document.getElementById('pollen-detaljer').innerText = `Dagens tal for ${pollenType}: ${pollenTal}`;
</script>

</body>
</html>
